<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Biology - StudyAI Zambia</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<header>
  <div class="header-container">
    <h1>Biology - StudyAI Zambia</h1>
    <button class="btn logout" onclick="logout()">Logout</button>
  </div>
</header>

<main class="dashboard">

  <div class="card">
    <h2>AI Study Mode / Upload Notes</h2>
    <input type="file" id="notesUpload" accept="application/pdf">
    <button class="btn" onclick="processNotes()">Summarize & Generate Questions</button>
    <div id="notesOutput" class="output"></div>
    <h3>Or use pre-summarized notes:</h3>
    <ul>
      <li>Cell Structure Summary</li>
      <li>Genetics Overview</li>
      <li>Photosynthesis Notes</li>
    </ul>
  </div>

  <div class="card">
    <h2>ECZ Past Papers</h2>
    <ul id="availablePapers">
      <li><input type="checkbox" value="Paper1"> Paper 1 - 2023</li>
      <li><input type="checkbox" value="Paper2"> Paper 2 - 2023</li>
      <li><input type="checkbox" value="Paper3"> Paper 3 - 2022</li>
    </ul>
  </div>

  <div class="card">
    <h2>Generate Mock Exam</h2>
    <input type="file" id="mockUpload" accept="application/pdf" multiple>
    <button class="btn" onclick="generateMock()">Create Mock Exam</button>
    <div id="mockOutput" class="output"></div>
  </div>

</main>

<footer>
  <p>© 2026 StudyAI Zambia | Version 1.0</p>
</footer>

<script>
function logout() {
  alert("Logged out");
  window.location.href = "index.html";
}

/* PDF Text Extraction */
async function extractPDFText(file) {
  const reader = new FileReader();
  return new Promise((resolve, reject) => {
    reader.onload = async function() {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;
      let text = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        content.items.forEach(item => { text += item.str + " "; });
      }
      resolve(text);
    };
    reader.readAsArrayBuffer(file);
  });
}

/* Notes */
async function processNotes() {
  const file = document.getElementById("notesUpload").files[0];
  if (!file) return alert("Upload a PDF first.");
  const text = await extractPDFText(file);
  document.getElementById("notesOutput").innerHTML =
    "<h3>Summary:</h3>" + text.substring(0, 800) +
    "<h3>Possible Questions:</h3>" +
    "1. Explain key concepts.<br>2. Define important terms.<br>3. Discuss major themes.";
}

/* Mock Exam */
async function generateMock() {
  const selectedPapers = Array.from(document.querySelectorAll('#availablePapers input:checked'));
  let combinedText = "";
  if(selectedPapers.length > 0) selectedPapers.forEach(p => { combinedText += p.value + " "; });
  const files = document.getElementById("mockUpload").files;
  for (let file of files) combinedText += await extractPDFText(file);
  if(selectedPapers.length + files.length < 2) return alert("Select at least 2 papers or upload 2 PDFs.");
  document.getElementById("mockOutput").innerHTML =
    "<h3>Generated Mock Exam:</h3>" +
    "Section A (10 Questions)<br>" +
    "Section B (5 Structured Questions)<br>" +
    "Section C (2 Essay Questions)<br><br>" +
    "<strong>Based on selected/ uploaded papers.</strong>";
}
</script>

</body>
</html>
