<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Biology - ExamReady</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Biology Resources</h1>
    <button id="logoutBtn">Logout</button>
  </header>

  <main>
    <div class="resource-cards">
      <div class="card" onclick="window.location.href='ai-study.html'">AI Study Mode</div>
      <div class="card" onclick="window.location.href='mock.html?subject=Biology'">Mock Exam</div>
      <div class="card" onclick="window.location.href='past-papers/biology.html'">Past Papers</div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/auth.js"></script>

  <script>
    firebase.auth().onAuthStateChanged(user => {
      if(!user) window.location.href = 'login.html';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      firebase.auth().signOut().then(() => window.location.href='login.html');
    });
  </script>
</body>
</html>
