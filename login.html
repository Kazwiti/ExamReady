<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - StudyAI Zambia</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

<header>
  <div class="header-container">
    <h1>StudyAI Zambia</h1>
  </div>
</header>

<main class="form-container">
  <h2>Login</h2>
  <input type="email" placeholder="Email" id="email">
  <input type="password" placeholder="Password" id="password">
  <button class="btn" id="loginBtn">Login</button>
  <p>Don't have an account? <a href="register.html">Register</a></p>
</main>

<footer>
  <p>© 2026 StudyAI Zambia | Version 1.0</p>
</footer>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDWa1UbqDd3VRGyGWn77j7IvouJaM5tUGs",
    authDomain: "examready-7413e.firebaseapp.com",
    projectId: "examready-7413e",
    storageBucket: "examready-7413e.firebasestorage.app",
    messagingSenderId: "914100635877",
    appId: "1:914100635877:web:caa3b48e18c16bd7ddec0c"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) return alert("All fields are required");

    try {
      await auth.signInWithEmailAndPassword(email, password);
      // Redirect to subjects/dashboard
      window.location.href = "subjects.html";
    } catch (error) {
      alert("Error: " + error.message);
    }
  });

  // Optional: Auto redirect if user already logged in
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = "subjects.html";
  });
</script>

</body>
</html>
